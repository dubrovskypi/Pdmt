services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdmt
      POSTGRES_USER: top_sa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

volumes:
  pgdata:
