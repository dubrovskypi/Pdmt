name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Pdmt.Api.Unit.Tests/Pdmt.Api.Unit.Tests.csproj

      - name: Build
        run: dotnet build Pdmt.Api.Unit.Tests/Pdmt.Api.Unit.Tests.csproj --no-restore

      - name: Test
        run: >
          dotnet test Pdmt.Api.Unit.Tests/Pdmt.Api.Unit.Tests.csproj
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/unit
          --logger "trx;LogFileName=unit-results.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: ./coverage/unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Pdmt.Api.Integration.Tests/Pdmt.Api.Integration.Tests.csproj

      - name: Build
        run: dotnet build Pdmt.Api.Integration.Tests/Pdmt.Api.Integration.Tests.csproj --no-restore

      - name: Test
        run: >
          dotnet test Pdmt.Api.Integration.Tests/Pdmt.Api.Integration.Tests.csproj
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/integration
          --logger "trx;LogFileName=integration-results.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: ./coverage/integration

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: ./coverage/unit

      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: ./coverage/integration

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate report
        run: >
          reportgenerator
          -reports:"./coverage/**/*.cobertura.xml"
          -targetdir:"./coverage/report"
          -reporttypes:"Html;JsonSummary;Badges"
          -title:"Pdmt API Coverage"

      - name: Check coverage threshold
        run: |
          LINE=$(jq '.summary.linecoverage' ./coverage/report/Summary.json)
          BRANCH=$(jq '.summary.branchcoverage' ./coverage/report/Summary.json)
          echo "Line coverage:   $LINE%"
          echo "Branch coverage: $BRANCH%"
          FAIL=0
          if (( $(echo "$LINE < 80" | bc -l) )); then
            echo "::error::Line coverage $LINE% is below the required 80%"
            FAIL=1
          fi
          if (( $(echo "$BRANCH < 75" | bc -l) )); then
            echo "::error::Branch coverage $BRANCH% is below the required 75%"
            FAIL=1
          fi
          if [ $FAIL -eq 1 ]; then exit 1; fi
          echo "Coverage OK (line=$LINE%, branch=$BRANCH%)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report
          retention-days: 14